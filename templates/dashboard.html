<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<div class="container">
    <h2>Welcome {{ user }}</h2>

    <div class="top-links">
       <a href="{{ url_for('watchlist') }}">My Watchlist</a>|
       <a href="{{ url_for('portfolio') }}">My Portfolio</a>|
    <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <p><b>Balance:</b> {{ balance }}</p>

    <table>
        <tr>
            <th>Company</th>
            <th>Price</th>
            <th>Date</th>
            <th>Watchlist</th>
            <th>Buy</th>
            <th>Chart</th>
        </tr>

        {% for stock in stocks %}
        <tr>
            <td>{{ stock.company }}</td>
            <td>{{ stock.price }}</td>
            <td>{{ stock.date }}</td>

            <td>
                {% if stock.company in user_watchlist %}
                    Added
                {% else %}
                    <a href="{{ url_for('add_to_watchlist', company=stock.company) }}">Add</a>
                {% endif %}
            </td>

            <td>
                <form method="POST" action="{{ url_for('buy', company=stock.company) }}">
                    <input type="number" name="quantity" value="1" min="1" required>
                    <button type="submit">Buy</button>
                </form>
            </td>

            <td>
                <a href="{{ url_for('chart', company=stock.company) }}">View Chart</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
